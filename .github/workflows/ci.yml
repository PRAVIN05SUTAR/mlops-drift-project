name: MLOps CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run ML Pipeline
      run: |
        python srs/data_ingestion.py
        python srs/preprocessing.py
        python srs/train.py
        python srs/drift_simulation.py
        python srs/evaluate.py